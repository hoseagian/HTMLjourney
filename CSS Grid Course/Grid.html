<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .grid-container{
            height: 700px;
            display: grid;
            grid-template-columns: 300px 300px 300px ;
            /* grid-template-rows: 300px 300px 300px ; */ /*Tanpa perlu  atur row, sudah pake grid auto row*/
            grid-auto-rows: 300px;
            gap: 1em;

            justify-items: center; /*Horizontal align*/
            align-items: center; /*Vertical align*/

            justify-content: center;/*Horizontal align grid parent*/
            align-content: center;/*Vertical align grid parent*/
        }
        .grid-container .bagian{
            height: 100px;
            width: 100px;
            background-color: brown;
            color: aliceblue;
            text-align: center;
            padding: 2em;
            border-radius: 10px;
            font-size: 1.5rem;
        }
    </style>
    <title>Grid Tutorial</title>
</head>
<body>
    <div class="grid-container">
        <div class="bagian">Bagian 1</div>
        <div class="bagian">Bagian 2</div>
        <div class="bagian">Bagian 3</div>
        <div class="bagian">Bagian 4</div>
        <div class="bagian">Bagian 5</div>
        <div class="bagian">Bagian 6</div>
        <div class="bagian">Bagian 7</div>
        <div class="bagian">Bagian 8</div>
        <div class="bagian">Bagian 9</div>
        <div class="bagian">Bagian 10</div>
        <div class="bagian">Bagian 11</div>
    </div>
</body>
</html>
